# =============================================================================
# Render Blueprint — Novixa
# https://render.com/docs/blueprint-spec
#
# Backend only (API + Celery + Redis + Postgres). Frontend deploys on Vercel.
# =============================================================================
services:
  - type: web
    name: novixa-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: starter
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: novixa-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: novixa-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: novixa-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: novixa-redis
          type: redis
          property: connectionString
      - key: CACHE_URL
        fromService:
          name: novixa-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: novixa-api.onrender.com,.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://novixa-omega.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://novixa-omega.vercel.app
      - key: FRONTEND_URL
        value: https://novixa-omega.vercel.app
      - key: SOCIAL_AUTH_STUB
        value: "False"
      - fromGroup: novixa-secrets

  # Frontend is deployed on Vercel (apps/web), not Render.

  - type: worker
    name: novixa-celery
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: starter
    dockerCommand: celery -A config worker --loglevel=warning --concurrency=2
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        fromService:
          name: novixa-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: novixa-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: novixa-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: novixa-redis
          type: redis
          property: connectionString
      - fromGroup: novixa-secrets

  - type: redis
    name: novixa-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: novixa-db
    # Legacy "starter" Postgres plans are no longer valid for new DBs.
    # Current options: free | basic-256mb | basic-1gb | basic-4gb | pro-*
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: novixa
    user: novixa

envVarGroups:
  - name: novixa-secrets
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SIGNING_KEY
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_ENVIRONMENT
        value: production
